name: Update Sitemap

on:
  push:
    branches:
      - main
    paths:
      - '*.html'
      - '*.css'
      - 'Images/**'
      - 'robots.txt'

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run sitemap update script
        run: |
          chmod +x scripts/update_sitemap.py
          ./scripts/update_sitemap.py --all-today

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet sitemap.xml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update sitemap.xml with latest changes'
          title: 'chore: Update sitemap.xml'
          body: |
            This PR was automatically generated to update the sitemap.xml file.

            The sitemap has been regenerated to reflect recent changes to the site content.

            ---
            *This PR was created automatically by the Update Sitemap workflow.*
          branch: update-sitemap
          delete-branch: true
          labels: |
            automated
            sitemap
