name: Deploy to Neocities

on:
  push:
    branches:
      - master

  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deployment even if sync PR is open"
        type: boolean
        default: false

concurrency:
  group: deploy-to-neocities
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Update sitemap
        run: |
          chmod +x scripts/update_sitemap.py
          ./scripts/update_sitemap.py --all-today

      - name: Generate LD-JSON
        run: |
          chmod +x scripts/generate_ld_json.py
          ./scripts/generate_ld_json.py

      - name: Build dist directory
        run: |
          mkdir -p dist
          # Copy only the files that should be deployed to Neocities
          cp -r *.html dist/ 2>/dev/null || true
          cp -r *.css dist/ 2>/dev/null || true
          cp -r *.js dist/ 2>/dev/null || true
          cp -r *.xml dist/ 2>/dev/null || true
          cp -r *.txt dist/ 2>/dev/null || true
          cp -r Images dist/ 2>/dev/null || true
          # List files that will be deployed
          echo "Files to deploy:"
          find dist -type f | sort

      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v2
        with:
          api_token: ${{ secrets.NEOCITIES_API_TOKEN }}
          cleanup: false
          dist_dir: dist

      - name: Deployment summary
        run: |
          echo "✅ Successfully deployed to Neocities!"
          echo "Trigger: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.force_deploy }}" == "true" ]; then
            echo "⚠️ This was a forced deployment"
          fi